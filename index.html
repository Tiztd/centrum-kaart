<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centrumkaart</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/papaparse/5.4.1/papaparse.min.js"></script>

    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .info-box {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: white;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.25);
            min-width: 250px;
        }

        .search-box {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: white;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.25);
        }

        .search-box input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 150px;
            font-size: 14px;
        }

        .search-box button {
            padding: 8px 12px;
            margin-left: 5px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .search-box button:hover {
            background-color: #0056b3;
        }

        .error {
            color: red;
            font-size: 12px;
            margin-top: 5px;
        }

        .loading {
            color: blue;
            font-size: 12px;
            margin-top: 5px;
        }

        .success {
            color: green;
            font-size: 12px;
            margin-top: 5px;
        }

        .batch-box {
            position: absolute;
            bottom: 10px;
            left: 10px;
            z-index: 1000;
            background: white;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.25);
            max-width: 300px;
        }

        .batch-box h4 {
            margin-top: 0;
            margin-bottom: 10px;
        }

        .batch-box input[type="file"] {
            display: none;
        }

        .batch-box label {
            display: inline-block;
            padding: 8px 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .batch-box label:hover {
            background-color: #218838;
        }

        .batch-box button {
            padding: 8px 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            margin-top: 5px;
        }

        .batch-box button:hover {
            background-color: #0056b3;
        }

        .batch-box button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .file-name {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background-color: #e9ecef;
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
            display: none;
        }

        .progress-fill {
            height: 100%;
            background-color: #28a745;
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>

<body>

<div id="map"></div>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="Postcode of gemeente" />
    <button onclick="search()">Zoeken</button>
    <div id="searchError"></div>
</div>

<div class="info-box">
    <h3>Dichtstbijzijnde centrum</h3>
    <div id="result">
        Klik ergens op de kaart of voer een postcode/gemeente in
    </div>
</div>

<div class="batch-box">
    <h4>Batch verwerking</h4>
    <label for="excelFile">Selecteer Excel file</label>
    <input type="file" id="excelFile" accept=".xlsx,.xls,.csv" />
    <div class="file-name" id="fileName"></div>
    <button onclick="processBatch()" id="processBtn" disabled>Verwerk postcodes</button>
    <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div id="batchStatus"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const centers = [
    { name: "AALST", postcode: "9300", lat: 50.936, lng: 4.035 },
    { name: "AARSCHOT", postcode: "3200", lat: 50.987, lng: 4.836 },
    { name: "WILRIJK", postcode: "2020", lat: 51.168, lng: 4.390 },
    { name: "BRASSCHAAT", postcode: "2930", lat: 51.291, lng: 4.492 },
    { name: "BUIZINGEN", postcode: "1501", lat: 50.742, lng: 4.267 },
    { name: "DIEST", postcode: "3290", lat: 50.989, lng: 5.051 },
    { name: "GEEL", postcode: "2440", lat: 51.165, lng: 4.989 },
    { name: "GENK", postcode: "3600", lat: 50.966, lng: 5.500 },
    { name: "GENT", postcode: "9000", lat: 51.054, lng: 3.717 },
    { name: "HASSELT", postcode: "3500", lat: 50.931, lng: 5.338 },
    { name: "HEIST-OP-DEN-BERG", postcode: "2220", lat: 51.075, lng: 4.728 },
    { name: "HERENTALS", postcode: "2200", lat: 51.176, lng: 4.833 },
    { name: "KEERBERGEN", postcode: "3140", lat: 51.002, lng: 4.634 },
    { name: "KORTENBERG", postcode: "3070", lat: 50.889, lng: 4.543 },
    { name: "KORTRIJK", postcode: "8500", lat: 50.826, lng: 3.264 },
    { name: "LEUVEN", postcode: "3010", lat: 50.879, lng: 4.701 },
    { name: "LIER", postcode: "2500", lat: 51.131, lng: 4.570 },
    { name: "LOKEREN", postcode: "9160", lat: 51.104, lng: 3.993 },
    { name: "MAASMECHELEN", postcode: "3630", lat: 50.965, lng: 5.694 },
    { name: "MECHELEN", postcode: "2800", lat: 51.025, lng: 4.477 },
    { name: "PELT", postcode: "3910", lat: 51.228, lng: 5.434 },
    { name: "TERVUREN", postcode: "3080", lat: 50.823, lng: 4.514 },
    { name: "TIENEN", postcode: "3300", lat: 50.808, lng: 4.939 },
    { name: "TURNHOUT", postcode: "2300", lat: 51.322, lng: 4.948 },
    { name: "VILVOORDE", postcode: "1800", lat: 50.928, lng: 4.429 },
    { name: "ZOUTLEEUW", postcode: "3440", lat: 50.835, lng: 5.103 },
    { name: "SINT-ANDRIES", postcode: "8200", lat: 51.197, lng: 3.177 }
];

let postcodeDatabase = {}; // Will be loaded from CSV

const map = L.map('map').setView([50.85, 4.6], 8);

L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        attribution: '&copy; OpenStreetMap'
    }
).addTo(map);

// Green marker icon for search location
const greenIcon = L.icon({
    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
    iconSize: [25, 41],
    iconAnchor: [12, 41],
    popupAnchor: [1, -34],
    shadowSize: [41, 41]
});

centers.forEach(center => {
    L.marker([center.lat, center.lng])
        .addTo(map)
        .bindPopup(`${center.name} (${center.postcode})`);
});

// Load postcodes database on startup
async function loadPostcodeDatabase() {
    try {
        const response = await fetch('postcodes.csv');
        const csv = await response.text();
        const lines = csv.split('\n');
        
        for (let i = 1; i < lines.length; i++) {
            if (lines[i].trim() === '') continue;
            const [postcode, lat, lng, gemeente] = lines[i].split(',');
            if (postcode && lat && lng) {
                postcodeDatabase[postcode.trim()] = {
                    lat: parseFloat(lat),
                    lng: parseFloat(lng),
                    gemeente: gemeente?.trim() || ''
                };
            }
        }
        console.log(`Loaded ${Object.keys(postcodeDatabase).length} postcodes`);
    } catch (error) {
        console.error('Failed to load postcode database:', error);
    }
}

// Load database when page loads
loadPostcodeDatabase();

function distance(lat1, lon1, lat2, lon2) {

    const R = 6371;

    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;

    const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) *
        Math.sin(dLon / 2);

    const c = 2 * Math.atan2(
        Math.sqrt(a),
        Math.sqrt(1 - a)
    );

    return R * c;
}

let clickMarker = null;
let routeLine = null;

function findNearestCenter(lat, lng) {
    let nearest = null;
    let bestDistance = Number.MAX_VALUE;

    centers.forEach(center => {
        const d = distance(
            lat,
            lng,
            center.lat,
            center.lng
        );

        if (d < bestDistance) {
            bestDistance = d;
            nearest = center;
        }
    });

    return { nearest, distance: bestDistance };
}

function displayResult(lat, lng) {
    if (clickMarker) {
        map.removeLayer(clickMarker);
    }

    if (routeLine) {
        map.removeLayer(routeLine);
    }

    clickMarker = L.marker([lat, lng], { icon: greenIcon }).addTo(map);

    const { nearest, distance: bestDistance } = findNearestCenter(lat, lng);

    routeLine = L.polyline(
        [
            [lat, lng],
            [nearest.lat, nearest.lng]
        ],
        { color: 'red' }
    ).addTo(map);

    document.getElementById("result").innerHTML = `
        <strong>${nearest.name}</strong><br>
        Postcode: ${nearest.postcode}<br>
        Afstand: ${bestDistance.toFixed(1)} km
    `;

    map.setView([lat, lng], 10);
}

map.on('click', function(e) {
    const lat = e.latlng.lat;
    const lng = e.latlng.lng;
    displayResult(lat, lng);
});

async function search() {
    const searchTerm = document.getElementById('searchInput').value.trim();
    const searchError = document.getElementById('searchError');
    searchError.innerHTML = '';

    if (!searchTerm) {
        searchError.innerHTML = '<div class="error">Voer postcode of gemeente in</div>';
        return;
    }

    // Check if search term matches a center name (case-insensitive)
    const foundCenter = centers.find(center => 
        center.name.toUpperCase() === searchTerm.toUpperCase() || 
        center.postcode === searchTerm
    );

    if (foundCenter) {
        displayResult(foundCenter.lat, foundCenter.lng);
        return;
    }

    // Check local postcode database
    if (postcodeDatabase[searchTerm]) {
        displayResult(postcodeDatabase[searchTerm].lat, postcodeDatabase[searchTerm].lng);
        return;
    }

    // If not a known postcode, try geocoding
    searchError.innerHTML = '<div class="loading">Zoeken...</div>';

    try {
        // Try as postcode first
        let response = await fetch(
            `https://nominatim.openstreetmap.org/search?postalcode=${searchTerm}&country=Belgium&format=json`
        );
        let results = await response.json();

        // If no postcode match, try as municipality name
        if (results.length === 0) {
            response = await fetch(
                `https://nominatim.openstreetmap.org/search?city=${searchTerm}&country=Belgium&format=json`
            );
            results = await response.json();
        }

        if (results.length > 0) {
            const lat = parseFloat(results[0].lat);
            const lng = parseFloat(results[0].lon);
            searchError.innerHTML = '';
            displayResult(lat, lng);
        } else {
            searchError.innerHTML = '<div class="error">Niet gevonden</div>';
        }
    } catch (error) {
        searchError.innerHTML = '<div class="error">Fout bij zoeken</div>';
        console.error('Geocoding error:', error);
    }
}

// Allow Enter key to search
document.getElementById('searchInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        search();
    }
});

// Batch processing functions
let selectedFile = null;

document.getElementById('excelFile').addEventListener('change', function(e) {
    selectedFile = e.target.files[0];
    if (selectedFile) {
        document.getElementById('fileName').textContent = 'Bestand: ' + selectedFile.name;
        document.getElementById('processBtn').disabled = false;
    }
});

async function processBatch() {
    if (!selectedFile) return;

    // Check if XLSX is loaded
    if (typeof XLSX === 'undefined') {
        document.getElementById('batchStatus').innerHTML = '<div class="error">XLSX bibliotheek laadt nog... Probeer over enkele seconden opnieuw.</div>';
        return;
    }

    const batchStatus = document.getElementById('batchStatus');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const processBtn = document.getElementById('processBtn');

    processBtn.disabled = true;
    batchStatus.innerHTML = '<div class="loading">Bestand laden...</div>';
    progressBar.style.display = 'block';

    try {
        const data = await selectedFile.arrayBuffer();
        const workbook = XLSX.read(data, { type: 'array' });
        const sheetName = workbook.SheetNames[0];
        const worksheet = workbook.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(worksheet);

        if (rows.length === 0) {
            batchStatus.innerHTML = '<div class="error">Geen data in bestand gevonden</div>';
            processBtn.disabled = false;
            progressBar.style.display = 'none';
            return;
        }

        const results = [];
        const total = rows.length;

        for (let i = 0; i < rows.length; i++) {
            const row = rows[i];
            const postcode = String(Object.values(row)[0]).trim(); // First column, convert to string

            if (!postcode || postcode === '') {
                results.push({
                    postcode: '',
                    centrum: 'Leeg',
                    afstand_km: '',
                    status: 'Fout'
                });
            } else {
                try {
                    // First try local database
                    let coordinates = null;
                    if (postcodeDatabase[postcode]) {
                        coordinates = postcodeDatabase[postcode];
                    } else {
                        // Fallback to geocoding
                        coordinates = await geocodePostcode(postcode);
                    }
                    
                    if (coordinates) {
                        const { nearest, distance: dist } = findNearestCenter(coordinates.lat, coordinates.lng);
                        results.push({
                            postcode: postcode,
                            centrum: nearest.name,
                            afstand_km: dist.toFixed(1),
                            status: 'OK'
                        });
                    } else {
                        results.push({
                            postcode: postcode,
                            centrum: 'Niet gevonden',
                            afstand_km: '',
                            status: 'Niet gevonden'
                        });
                    }
                } catch (error) {
                    console.error('Error processing postcode ' + postcode, error);
                    results.push({
                        postcode: postcode,
                        centrum: 'Fout',
                        afstand_km: '',
                        status: 'Fout'
                    });
                }
            }

            // Update progress bar
            const progress = ((i + 1) / total) * 100;
            progressFill.style.width = progress + '%';
            batchStatus.innerHTML = `<div class="loading">Verwerkt: ${i + 1}/${total}</div>`;

            // Very small delay (local lookup is fast)
            await new Promise(resolve => setTimeout(resolve, 10));
        }

        // Export to Excel
        exportToExcel(results);
        progressBar.style.display = 'none';
        batchStatus.innerHTML = `<div class="success">Klaar! ${results.length} rijen verwerkt en gedownload.</div>`;
        processBtn.disabled = false;

    } catch (error) {
        console.error('Error processing batch:', error);
        batchStatus.innerHTML = '<div class="error">Fout bij verwerking: ' + error.message + '</div>';
        progressBar.style.display = 'none';
        processBtn.disabled = false;
    }
}

async function geocodePostcode(postcode) {
    try {
        // Add timeout to prevent hanging requests
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);

        // Try postcode first
        let response = await fetch(
            `https://nominatim.openstreetmap.org/search?postalcode=${encodeURIComponent(postcode)}&country=Belgium&format=json`,
            { signal: controller.signal }
        );
        let results = await response.json();

        if (results.length > 0) {
            clearTimeout(timeoutId);
            return {
                lat: parseFloat(results[0].lat),
                lng: parseFloat(results[0].lon)
            };
        }

        clearTimeout(timeoutId);
        return null;
    } catch (error) {
        console.error('Geocoding error for postcode ' + postcode, error);
        return null;
    }
}

function exportToExcel(results) {
    const worksheet = XLSX.utils.json_to_sheet(results);
    worksheet['!cols'] = [
        { wch: 15 },
        { wch: 25 },
        { wch: 15 },
        { wch: 15 }
    ];
    
    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, 'Resultaten');
    
    const fileName = 'centra_' + new Date().toISOString().slice(0, 10) + '.xlsx';
    XLSX.writeFile(workbook, fileName);
}

</script>

</body>
</html>
